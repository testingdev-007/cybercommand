<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber Command Centre</title>
    <style>
        :root {
            --primary: #00ff66;
            --alert: #ff3333;
            --bg-dark: #05050a;
            --panel-bg: rgba(5, 5, 10, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
        }

        /* 3D WebGL Canvas */
        #globeContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        #threatLog {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 360px;
            height: 180px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            padding: 12px;
            font-size: 11px;
            overflow-y: hidden;
            pointer-events: none;
            z-index: 2;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.05);
        }

        .log-entry {
            margin-bottom: 5px;
            white-space: nowrap;
            animation: fadeIn 0.3s ease-out;
        }
        .log-entry.ddos { color: #ff9900; }
        .log-entry.malware { color: #ff3333; }
        .log-entry.phishing { color: #00ccff; }

        #controlPanel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 102, 0.15);
        }

        .btn {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary);
        }

        #btnFinish {
            color: var(--alert);
            border-color: var(--alert);
        }

        #btnFinish:hover {
            background: var(--alert);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--alert);
        }

        /* Video System */
        #videoContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
        }

        video {
            max-width: 90%;
            max-height: 85%;
            border: 2px solid rgba(0, 255, 102, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
            background: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="globeContainer"></div>
    <div id="threatLog"></div>

    <div id="controlPanel">
        <button id="btnStart" class="btn">Start Mission</button>
        <button id="btnFinish" class="btn">Finish Mission</button>
    </div>

    <div id="videoContainer">
        <video id="mainPlayer" controls></video>
    </div>

    <script src="three.min.js"></script>

    <script>
        // ==========================================
        // VIDEO CONFIGURATION
        // ==========================================
        const VIDEO_CONFIG = {
            startSequence: [
                "media/start1.mp4",
                "media/start2.mp4"
            ],
            finishVideo: "media/finish.mp4"
        };

        // ==========================================
        // 3D GLOBE ENGINE (Three.js)
        // ==========================================
        const container = document.getElementById('globeContainer');
        let scene, camera, renderer, globeGroup;
        let arcs = [];

        // Geolocation coordinates for recognizable cities
        const cities = [
            { name: "London", lat: 51.5074, lon: -0.1278 },
            { name: "New York", lat: 40.7128, lon: -74.0060 },
            { name: "Tokyo", lat: 35.6762, lon: 139.6503 },
            { name: "Sydney", lat: -33.8688, lon: 151.2093 },
            { name: "Cape Town", lat: -33.9249, lon: 18.4241 },
            { name: "São Paulo", lat: -23.5505, lon: -46.6333 },
            { name: "San Francisco", lat: 37.7749, lon: -122.4194 },
            { name: "Singapore", lat: 1.3521, lon: 103.8198 },
            { name: "Mumbai", lat: 19.0760, lon: 72.8777 },
            { name: "Dubai", lat: 25.2048, lon: 55.2708 }
        ];

        const attackTypes = [
            { name: "DDoS Vector", color: 0xff9900, class: "ddos" },
            { name: "Malware Injection", color: 0xff3333, class: "malware" },
            { name: "Phishing Stream", color: 0x00ccff, class: "phishing" }
        ];

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 220;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            // 1. Generate a recognizable world map via matrix dots
            createProceduralWorld();

            // 2. Add glowing rings/labels for cities
            createCityMarkers();

            // Tilt the globe slightly for a better command center layout view
            globeGroup.rotation.x = 0.3;

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // Converts Lat/Lon coordinates into a 3D Vector position on our sphere
        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);

            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.sin(theta)),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.cos(theta)
            );
        }

        // Procedural generator that maps math coordinates onto a sphere to mimic continents
        function createProceduralWorld() {
            const radius = 60;
            const dotCount = 8000;
            const geometry = new THREE.BufferGeometry();
            const positions = [];

            // Simple mathematical function to approximate visible landmasses 
            function isLand(lat, lon) {
                // Rough checks to sketch Americas, Eurasia, Africa, and Australia
                if (lat > -60 && lat < 75 && lon > -160 && lon < -35) {
                    return !(lat > 15 && lat < 50 && lon > -100 && lon < -80); // Quick cut for Atlantic/gulf
                }
                if (lat > -35 && lat < 75 && lon > -20 && lon < 145) return true; 
                if (lat > -40 && lat < -10 && lon > 110 && lon < 155) return true; 
                return false;
            }

            for (let i = 0; i < dotCount; i++) {
                const phi = Math.acos((Math.random() * 2) - 1);
                const theta = Math.random() * Math.PI * 2;

                const lat = 90 - (phi * 180 / Math.PI);
                const lon = (theta * 180 / Math.PI) - 180;

                if (isLand(lat, lon) || Math.random() < 0.03) { // Matrix dot density
                    const pos = new THREE.Vector3(
                        -(radius * Math.sin(phi) * Math.sin(theta)),
                        radius * Math.cos(phi),
                        radius * Math.sin(phi) * Math.cos(theta)
                    );
                    positions.push(pos.x, pos.y, pos.z);
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: 0x00ff66,
                size: 0.8,
                transparent: true,
                opacity: 0.35
            });

            const globeDots = new THREE.Points(geometry, material);
            globeGroup.add(globeDots);

            // Subtle wireframe base sphere underneath the dots
            const sphereGeo = new THREE.SphereGeometry(radius - 0.5, 32, 32);
            const sphereMat = new THREE.MeshBasicMaterial({
                color: 0x002211,
                wireframe: true,
                transparent: true,
                opacity: 0.04
            });
            const baseSphere = new THREE.Mesh(sphereGeo, sphereMat);
            globeGroup.add(baseSphere);
        }

        function createCityMarkers() {
            cities.forEach(city => {
                const pos = latLonToVector3(city.lat, city.lon, 60);
                
                const geo = new THREE.SphereGeometry(0.8, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ff66 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(pos);
                globeGroup.add(mesh);
            });
        }

        // Generates an arched mathematical line mapping between two nodes
        function launchAttackArc() {
            const fromCity = cities[Math.floor(Math.random() * cities.length)];
            let toCity = cities[Math.floor(Math.random() * cities.length)];
            while (toCity === fromCity) { toCity = cities[Math.floor(Math.random() * cities.length)]; }

            const attack = attackTypes[Math.floor(Math.random() * attackTypes.length)];
            const p1 = latLonToVector3(fromCity.lat, fromCity.lon, 60);
            const p2 = latLonToVector3(toCity.lat, toCity.lon, 60);

            // Calculate the 3D trajectory curve
            const numPoints = 30;
            const points = [];
            for (let i = 0; i <= numPoints; i++) {
                const t = i / numPoints;
                const p = new THREE.Vector3().lerpVectors(p1, p2, t);
                p.normalize();
                
                // Lift the arc into space based on an inverse parabola math curve
                const height = 12 * Math.sin(t * Math.PI); 
                p.multiplyScalar(60 + height);
                points.push(p);
            }

            const curve = new THREE.CatmullRomCurve3(points);
            const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
            
            const mat = new THREE.LineBasicMaterial({
                color: attack.color,
                transparent: true,
                opacity: 0.0 // Starts invisible, fades up during animation
            });

            const line = new THREE.Line(geo, mat);
            globeGroup.add(line);

            arcs.push({
                line: line,
                progress: 0,
                speed: 0.02 + Math.random() * 0.01
            });

            // Update UI Threat Log
            const logPanel = document.getElementById('threatLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${attack.class}`;
            entry.innerHTML = `[PING] ${attack.name}: ${fromCity.name} ➔ ${toCity.name}`;
            logPanel.appendChild(entry);
            if (logPanel.children.length > 8) logPanel.removeChild(logPanel.firstChild);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Slowly spin the globe
            globeGroup.rotation.y += 0.0015;

            // Animate flying attack tracers
            for (let i = arcs.length - 1; i >= 0; i--) {
                let arc = arcs[i];
                arc.progress += arc.speed;
                
                if(arc.progress <= 0.5) {
                    arc.line.material.opacity = arc.progress * 2; // Fade in
                } else {
                    arc.line.material.opacity = 2 * (1 - arc.progress); // Fade out
                }

                // Slice data coordinates geometry array to visually "draw" line forwards
                arc.line.geometry.setDrawRange(0, Math.floor(arc.progress * 50));

                if (arc.progress >= 1) {
                    globeGroup.remove(arc.line);
                    arcs.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        setInterval(launchAttackArc, 1500);
        window.onload = init3D;

        // ==========================================
        // SYSTEM CONTROLS & INTERRUPTS
        // ==========================================
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('mainPlayer');
        const btnStart = document.getElementById('btnStart');
        const btnFinish = document.getElementById('btnFinish');
        
        let currentSequenceIndex = 0;
        let isPlayingSequence = false;

        function playVideo(src) {
            videoPlayer.src = src;
            videoContainer.style.display = 'flex';
            videoPlayer.play().catch(err => console.log("System Alert: Media block handled.", err));
        }

        function closeVideoPlayer() {
            videoContainer.style.display = 'none';
            videoPlayer.pause();
            videoPlayer.src = "";
            isPlayingSequence = false;
        }

        btnStart.addEventListener('click', () => {
            if (VIDEO_CONFIG.startSequence.length === 0) return;
            isPlayingSequence = true;
            currentSequenceIndex = 0;
            playVideo(VIDEO_CONFIG.startSequence[currentSequenceIndex]);
        });

        btnFinish.addEventListener('click', () => {
            isPlayingSequence = false; 
            playVideo(VIDEO_CONFIG.finishVideo);
        });

        videoPlayer.addEventListener('ended', () => {
            if (isPlayingSequence) {
                currentSequenceIndex++;
                if (currentSequenceIndex < VIDEO_CONFIG.startSequence.length) {
                    playVideo(VIDEO_CONFIG.startSequence[currentSequenceIndex]);
                } else {
                    closeVideoPlayer();
                }
            } else {
                closeVideoPlayer();
            }
        });

        videoContainer.addEventListener('click', (e) => {
            if (e.target === videoContainer) closeVideoPlayer();
        });
    </script>
</body>
</html>
