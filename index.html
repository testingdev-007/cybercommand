<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber Command Centre - High Fidelity</title>
    <style>
        :root {
            --primary: #00ff66;
            --alert: #ff3333;
            --bg-dark: #05050a;
            --panel-bg: rgba(5, 5, 10, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
        }

        #globeContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #threatLog {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 380px;
            height: 220px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            padding: 12px;
            font-size: 11px;
            overflow-y: hidden;
            pointer-events: none;
            z-index: 2;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.05);
        }

        .log-entry {
            margin-bottom: 5px;
            white-space: nowrap;
            animation: fadeIn 0.2s ease-out;
        }
        .log-entry.ddos { color: #ff9900; }
        .log-entry.malware { color: #ff3333; }
        .log-entry.phishing { color: #00ccff; }

        #controlPanel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 102, 0.15);
        }

        .btn {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary);
        }

        #btnFinish {
            color: var(--alert);
            border-color: var(--alert);
        }

        #btnFinish:hover {
            background: var(--alert);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--alert);
        }

        #videoContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
        }

        video {
            max-width: 90%;
            max-height: 85%;
            border: 2px solid rgba(0, 255, 102, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
            background: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="globeContainer"></div>
    <div id="threatLog"></div>

    <div id="controlPanel">
        <button id="btnStart" class="btn">Start Mission</button>
        <button id="btnFinish" class="btn">Finish Mission</button>
    </div>

    <div id="videoContainer">
        <video id="mainPlayer" controls></video>
    </div>

    <script src="three.min.js"></script>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const VIDEO_CONFIG = {
            startSequence: ["media/start1.mp4", "media/start2.mp4"],
            finishVideo: "media/finish.mp4"
        };

        const GLOBE_RADIUS = 60;

        // ==========================================
        // HIGH-FIDELITY GEOGRAPHY (Coarse Map Data Array)
        // Accurate bounding boxes for highly recognizable shapes
        // ==========================================
        const LANDMASSES = [
            { minLat: 10, maxLat: 70, minLon: -130, maxLon: -60 },  // North America
            { minLat: -55, maxLat: 12, minLon: -80, maxLon: -35 },  // South America
            { minLat: 35, maxLat: 70, minLon: -10, maxLon: 40 },    // Europe
            { minLat: -35, maxLat: 35, minLon: -15, maxLon: 50 },   // Africa
            { minLat: 10, maxLat: 75, minLon: 40, maxLon: 145 },   // Asia
            { minLat: -40, maxLat: -10, minLon: 113, maxLon: 153 }, // Australia
            { minLat: 5, maxLat: 25, minLon: 95, maxLon: 140 },     // SE Asia / Islands
            { minLat: 60, maxLat: 83, minLon: -70, maxLon: -20 }    // Greenland
        ];

        const cities = [
            { name: "London", lat: 51.5, lon: -0.1 },
            { name: "New York", lat: 40.7, lon: -74.0 },
            { name: "Tokyo", lat: 35.6, lon: 139.6 },
            { name: "Sydney", lat: -33.8, lon: 151.2 },
            { name: "Cape Town", lat: -33.9, lon: 18.4 },
            { name: "São Paulo", lat: -23.5, lon: -46.6 },
            { name: "San Francisco", lat: 37.7, lon: -122.4 },
            { name: "Singapore", lat: 1.3, lon: 103.8 },
            { name: "Mumbai", lat: 19.0, lon: 72.8 },
            { name: "Dubai", lat: 25.2, lon: 55.2 },
            { name: "Reykjavik", lat: 64.1, lon: -21.8 }
        ];

        const attackTypes = [
            { name: "DDoS Vector", color: 0xff9900, class: "ddos" },
            { name: "Malware Injection", color: 0xff3333, class: "malware" },
            { name: "Phishing Stream", color: 0x00ccff, class: "phishing" }
        ];

        // ==========================================
        // 3D ENGINE INITIALIZATION
        // ==========================================
        const container = document.getElementById('globeContainer');
        let scene, camera, renderer, globeGroup;
        let arcs = [];

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 200;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            buildIdentifiableGlobe();
            createCityMarkers();

            globeGroup.rotation.x = 0.4; // Tilt toward screen
            
            window.addEventListener('resize', onWindowResize);
            animate();

            // MULTIPLE ATTACKS ENGINE: Run independent loops for simultaneous attacks
            setInterval(launchAttackArc, 600);  
            setInterval(launchAttackArc, 900);  
            setInterval(launchAttackArc, 1400); 
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.sin(theta)),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.cos(theta)
            );
        }

        // Generates an instantly recognizable map mesh using dense matrix zones
        function buildIdentifiableGlobe() {
            const positions = [];
            const density = 25000; 

            for (let i = 0; i < density; i++) {
                // Uniformly distribute coordinates across sphere surface
                const phi = Math.acos((Math.random() * 2) - 1);
                const theta = Math.random() * Math.PI * 2;

                const lat = 90 - (phi * 180 / Math.PI);
                const lon = (theta * 180 / Math.PI) - 180;

                // Match against real-world bounding configurations
                let insideLand = false;
                for (const land of LANDMASSES) {
                    if (lat >= land.minLat && lat <= land.maxLat && lon >= land.minLon && lon <= land.maxLon) {
                        // Noise filters to prevent blocky square borders and make coasts realistic
                        const noise = Math.sin(lat * 0.5) * Math.cos(lon * 0.5);
                        if (Math.random() > 0.15 || noise > -0.2) {
                            insideLand = true;
                            break;
                        }
                    }
                }

                if (insideLand) {
                    const pos = latLonToVector3(lat, lon, GLOBE_RADIUS);
                    positions.push(pos.x, pos.y, pos.z);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x00ff66,
                size: 0.6,
                transparent: true,
                opacity: 0.4
            });

            const globePoints = new THREE.Points(geometry, material);
            globeGroup.add(globePoints);

            // Tech Wireframe Sub-Layer
            const wireframeGeo = new THREE.SphereGeometry(GLOBE_RADIUS - 0.2, 30, 30);
            const wireframeMat = new THREE.MeshBasicMaterial({
                color: 0x00ff66,
                wireframe: true,
                transparent: true,
                opacity: 0.03
            });
            globeGroup.add(new THREE.Mesh(wireframeGeo, wireframeMat));
        }

        function createCityMarkers() {
            cities.forEach(city => {
                const pos = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS);
                const geo = new THREE.SphereGeometry(0.7, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ff66 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(pos);
                globeGroup.add(mesh);
            });
        }

        // ==========================================
        // MULTI-STREAM ATTACK LOGIC
        // ==========================================
        function launchAttackArc() {
            const fromCity = cities[Math.floor(Math.random() * cities.length)];
            let toCity = cities[Math.floor(Math.random() * cities.length)];
            while (toCity === fromCity) { toCity = cities[Math.floor(Math.random() * cities.length)]; }

            const attack = attackTypes[Math.floor(Math.random() * attackTypes.length)];
            const p1 = latLonToVector3(fromCity.lat, fromCity.lon, GLOBE_RADIUS);
            const p2 = latLonToVector3(toCity.lat, toCity.lon, GLOBE_RADIUS);

            const numPoints = 40;
            const points = [];
            
            for (let i = 0; i <= numPoints; i++) {
                const t = i / numPoints;
                const p = new THREE.Vector3().lerpVectors(p1, p2, t);
                p.normalize();
                
                // Parabolic arc height logic
                const arcHeight = 15 * Math.sin(t * Math.PI);
                p.multiplyScalar(GLOBE_RADIUS + arcHeight);
                points.push(p);
            }

            const curve = new THREE.CatmullRomCurve3(points);
            const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(60));
            
            const mat = new THREE.LineBasicMaterial({
                color: attack.color,
                transparent: true,
                opacity: 0.8
            });

            const line = new THREE.Line(geo, mat);
            line.geometry.setDrawRange(0, 0); // Hide initially, draw inside loop
            globeGroup.add(line);

            arcs.push({
                line: line,
                progress: 0,
                speed: 0.015 + Math.random() * 0.02
            });

            // Concurrent Terminal Logging Updates
            const logPanel = document.getElementById('threatLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${attack.class}`;
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `[${time}] ${attack.name.toUpperCase()}: ${fromCity.name} ➔ ${toCity.name}`;
            logPanel.appendChild(entry);
            
            if (logPanel.children.length > 10) logPanel.removeChild(logPanel.firstChild);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // ==========================================
        // FRAME ANIMATION RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            globeGroup.rotation.y += 0.0012; // Continuous base spin

            // Cycle and update all concurrent line arrays dynamically
            for (let i = arcs.length - 1; i >= 0; i--) {
                let arc = arcs[i];
                arc.progress += arc.speed;
                
                // Draw the line segment moving forward across frame values
                const totalLineSegments = 60;
                arc.line.geometry.setDrawRange(0, Math.floor(arc.progress * totalLineSegments));

                // Fade out trail near execution termination
                if (arc.progress > 0.7) {
                    arc.line.material.opacity = (1 - arc.progress) * 3.3;
                }

                if (arc.progress >= 1) {
                    globeGroup.remove(arc.line);
                    arc.line.geometry.dispose();
                    arc.line.material.dispose();
                    arcs.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init3D;

        // ==========================================
        // MISSION VIDEO LAYER PIPELINES
        // ==========================================
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('mainPlayer');
        const btnStart = document.getElementById('btnStart');
        const btnFinish = document.getElementById('btnFinish');
        
        let currentSequenceIndex = 0;
        let isPlayingSequence = false;

        function playVideo(src) {
            videoPlayer.src = src;
            videoContainer.style.display = 'flex';
            videoPlayer.play().catch(err => console.log("Media stream interrupted.", err));
        }

        function closeVideoPlayer() {
            videoContainer.style.display = 'none';
            videoPlayer.pause();
            videoPlayer.src = "";
            isPlayingSequence = false;
        }

        btnStart.addEventListener('click', () => {
            if (VIDEO_CONFIG.startSequence.length === 0) return;
            isPlayingSequence = true;
            currentSequenceIndex = 0;
            playVideo(VIDEO_CONFIG.startSequence[currentSequenceIndex]);
        });

        btnFinish.addEventListener('click', () => {
            isPlayingSequence = false; 
            playVideo(VIDEO_CONFIG.finishVideo);
        });

        videoPlayer.addEventListener('ended', () => {
            if (isPlayingSequence) {
                currentSequenceIndex++;
                if (currentSequenceIndex < VIDEO_CONFIG.startSequence.length) {
                    playVideo(VIDEO_CONFIG.startSequence[currentSequenceIndex]);
                } else {
                    closeVideoPlayer();
                }
            } else {
                closeVideoPlayer();
            }
        });

        videoContainer.addEventListener('click', (e) => {
            if (e.target === videoContainer) closeVideoPlayer();
        });
    </script>
</body>
</html>
